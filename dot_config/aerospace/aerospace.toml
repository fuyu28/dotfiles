# i3の操作感をmacOSへ移植したAeroSpace設定
start-at-login = true
after-login-command = []
after-startup-command = [
  'exec-and-forget borders active_color=0xffd8a5ff inactive_color=0xff4c4a63 width=4.0',
]

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true
accordion-padding = 30
on-focus-changed = []

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 6
inner.vertical = 6
outer.left = 3
outer.right = 3
outer.top = 3
outer.bottom = 3

[mode.main.binding]
# アプリ起動
alt-enter = 'exec-and-forget open -na Ghostty'
alt-d = 'exec-and-forget open -na Raycast'
alt-f2 = 'exec-and-forget open -na "Google Chrome"'
alt-f3 = 'exec-and-forget open -na Finder'
alt-p = 'exec-and-forget open -na "Visual Studio Code"'
alt-esc = 'exec-and-forget open -na "Activity Monitor"'

# ウィンドウ操作
alt-shift-q = 'close'
alt-f = 'fullscreen'
alt-shift-space = 'layout floating tiling'
alt-space = 'layout floating tiling'

# フォーカス移動
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'
alt-left = 'focus left'
alt-down = 'focus down'
alt-up = 'focus up'
alt-right = 'focus right'

# ウィンドウ移動
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'
alt-shift-left = 'move left'
alt-shift-down = 'move down'
alt-shift-up = 'move up'
alt-shift-right = 'move right'

# レイアウト
alt-o = 'join-with right'
alt-shift-o = 'join-with down'
alt-q = 'layout tiles horizontal vertical'
alt-s = 'layout accordion'
alt-w = 'layout accordion'
alt-e = 'layout tiles horizontal vertical'

# ワークスペース
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'

alt-ctrl-1 = 'move-node-to-workspace 1'
alt-ctrl-2 = 'move-node-to-workspace 2'
alt-ctrl-3 = 'move-node-to-workspace 3'
alt-ctrl-4 = 'move-node-to-workspace 4'
alt-ctrl-5 = 'move-node-to-workspace 5'
alt-ctrl-6 = 'move-node-to-workspace 6'
alt-ctrl-7 = 'move-node-to-workspace 7'
alt-ctrl-8 = 'move-node-to-workspace 8'

alt-shift-1 = 'move-node-to-workspace --focus-follows-window 1'
alt-shift-2 = 'move-node-to-workspace --focus-follows-window 2'
alt-shift-3 = 'move-node-to-workspace --focus-follows-window 3'
alt-shift-4 = 'move-node-to-workspace --focus-follows-window 4'
alt-shift-5 = 'move-node-to-workspace --focus-follows-window 5'
alt-shift-6 = 'move-node-to-workspace --focus-follows-window 6'
alt-shift-7 = 'move-node-to-workspace --focus-follows-window 7'
alt-shift-8 = 'move-node-to-workspace --focus-follows-window 8'

alt-b = 'workspace-back-and-forth'
alt-ctrl-right = 'workspace --wrap-around next'
alt-ctrl-left = 'workspace --wrap-around prev'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'
alt-shift-f = 'flatten-workspace-tree'
alt-shift-c = 'reload-config'
alt-r = 'mode resize'
alt-shift-semicolon = 'mode service'

[mode.resize.binding]
h = 'resize width -50'
l = 'resize width +50'
j = 'resize height +50'
k = 'resize height -50'
left = 'resize width -100'
right = 'resize width +100'
down = 'resize height +100'
up = 'resize height -100'
enter = 'mode main'
esc = 'mode main'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.ActivityMonitor'
run = 'layout floating'
