format = """
[в–‘в–’в–“](#a3aed2)\
[ пҶ— ](bg:#a3aed2 fg:#090c0c)\
[оӮҙ](bg:#769ff0 fg:#a3aed2)\
$directory\
[оӮҙ](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[оӮҙ](fg:#394260 bg:#212736)\
$nodejs\
$rust\
$golang\
$php\
$python\
$java\
$docker_context\
$c\
[оӮҙ](fg:#212736 bg:#1d2230)\
$time\
