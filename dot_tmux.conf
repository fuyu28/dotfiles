##### prefix #####

# C-b から C-Space に変更
unbind C-b
set -g prefix C-a
bind C-a send-prefix


##### basic #####

# 設定ファイルをリロードする
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# ウィンドウ / ペインの開始番号
set -g base-index 1
set -g pane-base-index 1

# ウィンドウ履歴の最大行数
set -g history-limit 5000

# Esc の反応を速くする
set -s escape-time 0

# マウス
set -g mouse on

# クリップボード
set -g set-clipboard on
set -g allow-passthrough on

##### focus #####

# タブ移動・ウィンドウ移動時のフォーカスイベントを無効化
set -g focus-events off


##### terminal / truecolor #####

set -g default-terminal "tmux-256color"

# truecolor
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",xterm-kitty:RGB"
set -as terminal-features ",ghostty:RGB"


##### cursor #####

# アプリケーションがカーソル形状を変更できるようにする
set -g cursor-style blinking-bar

# アプリがカーソル形状を変更した後、reset 時も縦棒に戻す
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[5 q'

##### window / pane behavior #####

# ウィンドウ名の自動変更を無効化
set -g automatic-rename off
set -g allow-rename off

# 現在のディレクトリで新規ウィンドウ / ペインを開く
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"


##### pane movement / resize #####

# ペイン移動
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペインのリサイズ
bind -r H resize-pane -L 10
bind -r J resize-pane -D 10
bind -r K resize-pane -U 10
bind -r L resize-pane -R 10


##### copy mode #####

# コピーモードを vi 風にする
set -g mode-keys vi

# コピーモードに入る / ペースト
bind Space copy-mode
bind p paste-buffer

# v で選択開始
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle

# y でコピー
# macOS では pbcopy に流してシステムクリップボードにも入れる
if-shell 'test "$(uname)" = "Darwin"' {
  bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
} {
  bind -T copy-mode-vi y send -X copy-selection-and-cancel
}

# 行コピー
bind -T copy-mode-vi Y send -X copy-line


##### appearance #####

# ステータスバー
set -g status-style fg=#c0caf5,bg=#1a1b26

# ウィンドウリスト
setw -g window-status-style fg=#565f89,bg=default
setw -g window-status-current-style fg=#c0caf5,bg=#3d59a1,bold

# ペインボーダー
set -g pane-border-style fg=#3b4261
set -g pane-active-border-style fg=#7aa2f7

# コマンドライン
set -g message-style fg=white,bg=black,bold

# コピーモードの背景色・文字色
set -g mode-style fg=#c0caf5,bg=#3d59a1
